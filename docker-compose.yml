version: '3.8'

services:
  feeder_app:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        ENVIRONMENT: docker
    volumes:
      - ./log:/app/log
    environment:
      ENVIRONMENT: docker
      DB_HOST_Docker: ${DB_HOST_Docker}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      production: ${production}
      grpcAddress: ${grpcAddress}
      debug: ${debug}
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: